<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>賢哥的暗棋 - 斬首進化版</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: "Noto Serif TC", serif; margin: 0; background-color: #1c1917; overflow: hidden; touch-action: manipulation; }
        @keyframes confetti { 0% { transform: translateY(-100%) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
        .confetti { position: absolute; width: 10px; height: 10px; background: gold; animation: confetti 3s linear infinite; z-index: 110; pointer-events: none; }
        .animate-fade-in { animation: fade-in 0.1s ease-out forwards; }
        @keyframes fade-in { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .game-board { border: 4px solid black !important; }
        .game-cell { border: 2px solid black !important; box-sizing: border-box; }
        @keyframes flash-toast { 
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } 
            10% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); } 
            90% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); } 
        }
        .animate-flash-toast { animation: flash-toast 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script id="worker-code" type="javascript/worker">
        // 提高核心棋子的價值，讓 AI 更執著於獵殺
        const VAL_MAP = { 7: 15000, 6: 4000, 5: 3500, 4: 2800, 3: 1800, 2: 5000, 1: 1000 };
        let isTimeout = false;
        let nodeCount = 0;

        function getObstacleCount(f, t, b) {
            const r1 = Math.floor(f / 4), c1 = f % 4, r2 = Math.floor(t / 4), c2 = t % 4;
            let cnt = 0;
            if (r1 === r2) { for (let c = Math.min(c1, c2) + 1; c < Math.max(c1, c2); c++) if (b[r1 * 4 + c] !== 0) cnt++; }
            else if (c1 === c2) { for (let r = Math.min(r1, r2) + 1; r < Math.max(r1, r2); r++) if (b[r * 4 + c1] !== 0) cnt++; }
            else return -1;
            return cnt;
        }

        function isValid(f, t, b) {
            const pf = b[f], pt = b[t];
            if (pf === 0 || Math.abs(pf) > 100) return false;
            if (Math.abs(pt) > 100) return false;
            if (pt !== 0 && (pf > 0) === (pt > 0)) return false;
            const dist = Math.abs(Math.floor(f/4)-Math.floor(t/4)) + Math.abs((f%4)-(t%4));
            const af = Math.abs(pf), at = Math.abs(pt);
            if (af === 2) return (Math.floor(f/4)===Math.floor(t/4)||f%4===t%4) ? (pt !== 0 ? getObstacleCount(f,t,b) === 1 : dist === 1) : false;
            if (dist !== 1) return false;
            if (pt === 0) return true;
            return af === 1 ? (at === 7 || at === 1) : (af === 7 ? at !== 1 : af >= at);
        }

        function evaluate(b, isRed) {
            let s = 0, aiP = [], opP = [];
            let aiTotalVal = 0, opTotalVal = 0;
            for(let i=0; i<32; i++) {
                const v = b[i]; if(v===0) continue;
                const rv = Math.abs(v) > 100 ? (v>0 ? v-100 : v+100) : v;
                const isPieceAi = (isRed && rv > 0) || (!isRed && rv < 0);
                const val = VAL_MAP[Math.abs(rv)] || 0;
                if(isPieceAi) { aiP.push(i); aiTotalVal += val; } 
                else { opP.push(i); opTotalVal += val; }
            }
            if (opP.length === 0) return 9999999;
            if (aiP.length === 0) return -9999999;
            
            s += (aiTotalVal - opTotalVal);

            // 斬首行動：當敵方大棋（將、士、象、炮）存在時，強烈吸引 AI 靠近
            for(let i of opP) {
                const rv = Math.abs(b[i]) > 100 ? (b[i]>0 ? b[i]-100 : b[i]+100) : b[i];
                const rank = Math.abs(rv);
                let r = Math.floor(i/4), c = i%4;
                
                // 敵方大棋越靠近棋盤中心越危險，強迫 AI 獵殺
                if ([7, 6, 5, 2].includes(rank)) {
                    s += (Math.pow(Math.abs(r-3.5), 2) + Math.pow(Math.abs(c-1.5), 2)) * 150;
                } else {
                    s += (Math.pow(Math.abs(r-3.5), 2) + Math.pow(Math.abs(c-1.5), 2)) * 50;
                }
            }
            return s;
        }

        function generate(b, color, isAi, actualAiColor) {
            const m = [];
            for(let i=0; i<32; i++){
                const v = b[i]; if(v===0) continue;
                const isMine = (color && v > 0) || (!color && v < 0);
                if (Math.abs(v) > 100) {
                    const rv = v > 0 ? v-100 : v+100;
                    let fs = 0;
                    if(color === actualAiColor) {
                        const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
                        for(let [dr,dc] of dirs) {
                            const nr=Math.floor(i/4)+dr, nc=i%4+dc;
                            if(nr>=0 && nr<8 && nc>=0 && nc<4) {
                                const nv = b[nr*4+nc];
                                if(nv!==0) {
                                    const nrv = Math.abs(nv)>100 ? (nv>0?nv-100:nv+100) : nv;
                                    if(color !== (nrv>0)) {
                                        // 斬首翻牌邏輯：看到大棋就翻開，權重拉到最高
                                        if (Math.abs(rv) === 7) fs += 5000000;
                                        if ([6, 5, 2].includes(Math.abs(rv))) fs += 2000000;
                                        if (Math.abs(rv) >= Math.abs(nrv) || (Math.abs(rv)===1 && Math.abs(nrv)===7)) fs += 1000000;
                                    }
                                }
                            }
                        }
                    }
                    m.push({ a:'flip', idx:i, rv, s: fs + 10 });
                } else if (isMine) {
                    for(let j=0; j<32; j++) { 
                        if(isValid(i,j,b)) {
                            const target = b[j];
                            let targetRank = target !== 0 ? Math.abs(Math.abs(target) > 100 ? (target > 0 ? target - 100 : target + 100) : target) : 0;
                            
                            // 斬首獵殺權重：吃掉大棋的分數呈指數級增長
                            let ms = target !== 0 ? VAL_MAP[targetRank] * 100000 : 10;
                            
                            // 距離修正：引導棋子主動包圍中心區
                            if(target===0) ms -= (Math.abs(Math.floor(i/4)-3.5) + Math.abs(i%4-1.5));
                            m.push({ a:'move', from:i, to:j, s: ms });
                        }
                    }
                }
            }
            return m.sort((a,b)=>b.s-a.s);
        }

        function minimax(b, d, al, be, isMax, isRed, st, limit) {
            if(isTimeout) return 0;
            if((++nodeCount & 255) === 0 && Date.now()-st >= limit) { isTimeout = true; return 0; }
            const ev = evaluate(b, isRed);
            if(Math.abs(ev)>9000000 || d===0) return ev;
            const currentColor = isMax ? isRed : !isRed;
            const moves = generate(b, currentColor, false, isRed);
            if(moves.length === 0) return ev;
            if(isMax) {
                let mx = -Infinity;
                for(let m of moves.slice(0, 16)) {
                    const nb = new Int8Array(b); if(m.a==='flip') nb[m.idx]=m.rv; else { nb[m.to]=nb[m.from]; nb[m.from]=0; }
                    const res = minimax(nb, d-1, al, be, false, isRed, st, limit);
                    if(isTimeout) return 0; mx = Math.max(mx, res); al = Math.max(al, res); if(be<=al) break;
                }
                return mx;
            } else {
                let mi = Infinity;
                for(let m of moves.slice(0, 16)) {
                    const nb = new Int8Array(b); if(m.a==='flip') nb[m.idx]=m.rv; else { nb[m.to]=nb[m.from]; nb[m.from]=0; }
                    const res = minimax(nb, d-1, al, be, true, isRed, st, limit);
                    if(isTimeout) return 0; mi = Math.min(mi, res); be = Math.min(be, res); if(be<=al) break;
                }
                return mi;
            }
        }

        self.onmessage = function(e) {
            const { boardData, aiColor, timeLimit } = e.data;
            const b = new Int8Array(boardData), isRed = aiColor === 'red', st = Date.now();
            isTimeout = false; nodeCount = 0;
            const mvs = generate(b, isRed, true, isRed);
            if(mvs.length === 0) { self.postMessage({ move: null }); return; }
            let best = mvs[0], mx = -Infinity;
            for(let d=4; d<=10; d+=2) {
                let cBest = null, cScore = -Infinity;
                for(let m of mvs.slice(0, 16)) {
                    const nb = new Int8Array(b); if(m.a==='flip') nb[m.idx]=m.rv; else { nb[m.to]=nb[m.from]; nb[m.from]=0; }
                    const s = minimax(nb, d-1, -Infinity, Infinity, false, isRed, st, timeLimit);
                    if(isTimeout) break;
                    if(s > cScore) { cScore = s; cBest = m; }
                }
                if(isTimeout) break;
                if(cScore > mx && cBest) { mx = cScore; best = cBest; }
            }
            self.postMessage({ move: best });
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ children, size = 24, className = "" }) => ( <svg viewBox="0 0 24 24" width={size} height={size} stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg> );
        const Trophy = (p) => <Icon {...p}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 1.1-.9 2-2 2H4"/><path d="M14 14.66V17c0 1.1.9 2 2 2h12"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></Icon>;
        const RefreshCw = (p) => <Icon {...p}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></Icon>;
        const Volume2 = (p) => <Icon {...p}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></Icon>;
        const VolumeX = (p) => <Icon {...p}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></Icon>;
        const AlertCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" i="16"/></Icon>;
        const Flag = (p) => <Icon {...p}><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></Icon>;
        const Clock = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;

        const PIECE_TYPES = { GENERAL:7, GUARD:6, BISHOP:5, ROOK:4, HORSE:3, CANNON:2, SOLDIER:1 };
        const TAUNTS = [ "斬首完成，你已無路可退。", "算力獵殺，這就是降維打擊。", "你的大將已盡數折損，認輸吧。", "天眼之下，所有的埋伏都是笑話。", "東方不敗的字典裡只有殺戮。", "既然實力懸殊，早點放棄也好。" ];

        function HiddenChessApp() {
            const [gameState, setGameState] = useState('lobby'); 
            const [board, setBoard] = useState(Array(32).fill(null));
            const [turn, setTurn] = useState('red'); 
            const [userColor, setUserColor] = useState(null); 
            const [playerScore, setPlayerScore] = useState(10000); 
            const [animatingPiece, setAnimatingPiece] = useState(null);
            const [showWinScreen, setShowWinScreen] = useState(false);
            const [winMessage, setWinMessage] = useState({});
            const [playerTimeLeft, setPlayerTimeLeft] = useState(60);
            const [eatToast, setEatToast] = useState(null);
            const [noProgressCount, setNoProgressCount] = useState(0);
            const [matchHistory, setMatchHistory] = useState([]);
            const [selectedIdx, setSelectedIdx] = useState(null);
            const [soundOn, setSoundOn] = useState(true);
            const [isAiThinking, setIsAiThinking] = useState(false);
            const [showTimeoutWarning, setShowTimeoutWarning] = useState(false);
            const [graveyard, setGraveyard] = useState({ red: [], black: [] }); 
            
            const aiWorkerRef = useRef(null);
            const timerRef = useRef(null);
            const audioCtxRef = useRef(null);

            const playSound = (type) => {
                if (!soundOn) return;
                if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                const ctx = audioCtxRef.current;
                if (ctx.state === 'suspended') ctx.resume();
                const osc = ctx.createOscillator(); const g = ctx.createGain();
                osc.connect(g); g.connect(ctx.destination);
                const now = ctx.currentTime;
                switch (type) {
                    case 'flip': osc.type='sine'; osc.frequency.setValueAtTime(800, now); g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.01, now+0.1); osc.start(); osc.stop(now+0.1); break;
                    case 'move': osc.type='triangle'; osc.frequency.setValueAtTime(300, now); g.gain.setValueAtTime(0.1, now); g.gain.exponentialRampToValueAtTime(0.01, now+0.1); osc.start(); osc.stop(now+0.1); break;
                    case 'eat': osc.type='square'; osc.frequency.setValueAtTime(150, now); g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.01, now+0.3); osc.start(); osc.stop(now+0.3); break;
                    case 'win': [440, 554, 659, 880].forEach((f, i) => { const o = ctx.createOscillator(), gg = ctx.createGain(); o.connect(gg); gg.connect(ctx.destination); o.frequency.setValueAtTime(f, now+i*0.1); gg.gain.setValueAtTime(0.1, now+i*0.1); gg.gain.linearRampToValueAtTime(0, now+i*0.1+0.5); o.start(now+i*0.1); o.stop(now+i*0.1+0.5); }); break;
                    case 'lose': osc.type='sawtooth'; osc.frequency.setValueAtTime(200, now); g.gain.setValueAtTime(0.3, now); g.gain.linearRampToValueAtTime(0, now + 0.8); osc.start(now); osc.stop(now + 0.8); break;
                    case 'warning': osc.type='sawtooth'; osc.frequency.setValueAtTime(600, now); g.gain.setValueAtTime(0.1, now); g.gain.linearRampToValueAtTime(0, now + 0.3); osc.start(now); osc.stop(now + 0.3); break;
                }
            };

            useEffect(() => {
                const code = document.getElementById('worker-code').textContent;
                const blob = new Blob([code], { type: 'application/javascript' });
                aiWorkerRef.current = new Worker(URL.createObjectURL(blob));
                const savedScore = localStorage.getItem('hiddenChess_score');
                if (savedScore) setPlayerScore(parseInt(savedScore, 10));
                return () => aiWorkerRef.current.terminate();
            }, []);

            const recordMove = (move) => setMatchHistory(prev => [...prev, { ...move, t: Date.now() }]);

            const endGame = (isWin, detail, isDraw = false) => {
                if (gameState === 'ended') return; 
                setGameState('ended');
                setIsAiThinking(false);
                const pts = isDraw ? 0 : (isWin ? 500 : -500);
                setPlayerScore(s => { const ns = s + pts; localStorage.setItem('hiddenChess_score', ns.toString()); return ns; });
                setWinMessage({ title: isDraw ? '平局！' : (isWin ? '不可思議！' : '敗局！'), detail, points: isDraw ? '+ 0' : (isWin ? '+ 500' : '- 500') });
                setShowWinScreen(true);
                if (!isDraw) playSound(isWin ? 'win' : 'lose');
                const archive = JSON.parse(localStorage.getItem('hiddenChess_archive') || '[]');
                archive.push({ isWin, detail, date: new Date().toISOString(), history: matchHistory });
                localStorage.setItem('hiddenChess_archive', JSON.stringify(archive.slice(-100)));
            };

            const handleSurrender = () => endGame(false, TAUNTS[Math.floor(Math.random() * TAUNTS.length)]);

            useEffect(() => {
                if (gameState === 'playing' && userColor && turn === userColor) {
                    timerRef.current = setInterval(() => {
                        setPlayerTimeLeft((prev) => {
                            if (prev === 21) { setShowTimeoutWarning(true); playSound('warning'); }
                            if (prev <= 1) { clearInterval(timerRef.current); endGame(false, "思考超時，判負。"); return 0; }
                            return prev - 1;
                        });
                    }, 1000);
                } else { clearInterval(timerRef.current); setPlayerTimeLeft(60); setShowTimeoutWarning(false); }
                return () => clearInterval(timerRef.current);
            }, [turn, userColor, gameState, soundOn]);

            const downloadArchive = () => {
                const a = localStorage.getItem('hiddenChess_archive') || '[]';
                const b = new Blob([a], { type: 'application/json' });
                const u = URL.createObjectURL(b); const l = document.createElement('a');
                l.href = u; l.download = `chess_logs_${Date.now()}.json`; l.click();
            };

            const initGame = () => {
                let p = [];
                ['red', 'black'].forEach(c => {
                    const counts = { GENERAL:1, GUARD:2, BISHOP:2, ROOK:2, HORSE:2, CANNON:2, SOLDIER:5 };
                    Object.entries(counts).forEach(([type, n]) => {
                        for(let i=0; i<n; i++) p.push({ id:`${c}-${type}-${i}`, color:c, type, hidden:true, name:(c==='red'?{GENERAL:'帥',GUARD:'仕',BISHOP:'相',ROOK:'俥',HORSE:'傌',CANNON:'炮',SOLDIER:'兵'}:{GENERAL:'將',GUARD:'士',BISHOP:'象',ROOK:'車',HORSE:'馬',CANNON:'包',SOLDIER:'卒'})[type] });
                    });
                });
                for (let i = p.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [p[i], p[j]] = [p[j], p[i]]; }
                setBoard(p); setTurn('red'); setUserColor(null); setGraveyard({ red: [], black: [] }); setGameState('playing'); setShowWinScreen(false); setNoProgressCount(0); setSelectedIdx(null); setPlayerTimeLeft(60); setMatchHistory([]);
            };

            const getObstacleCountFE = (f, t, b) => {
                const r1 = Math.floor(f/4), c1 = f%4, r2 = Math.floor(t/4), c2 = t%4;
                let cnt = 0;
                if (r1 === r2) { for (let c = Math.min(c1, c2) + 1; c < Math.max(c1, c2); c++) if (b[r1*4+c]) cnt++; }
                else if (c1 === c2) { for (let r = Math.min(r1, r2) + 1; r < Math.max(r1, r2); r++) if (b[r*4+c1]) cnt++; }
                else return -1;
                return cnt;
            };

            const isValidFE = (f, t, b) => {
                const pf = b[f], pt = b[t]; if (!pf || pf.hidden) return false;
                const d = Math.abs(Math.floor(f/4)-Math.floor(t/4)) + Math.abs((f%4)-(t%4));
                if (pf.type === 'CANNON') {
                    if (Math.floor(f/4)!==Math.floor(t/4) && f%4!==t%4) return false;
                    if (pt) {
                        let cnt = getObstacleCountFE(f,t,b);
                        return cnt === 1 && !pt.hidden && pf.color !== pt.color;
                    }
                    return d === 1;
                }
                if (d !== 1) return false; if (!pt) return true; if (pt.hidden || pf.color === pt.color) return false;
                const fr = PIECE_TYPES[pf.type], tr = PIECE_TYPES[pt.type];
                return fr === 1 ? (tr === 7 || tr === 1) : (fr === 7 ? tr !== 1 : fr >= tr);
            };

            const revealPiece = (idx) => {
                playSound('flip');
                setBoard(prev => {
                    const nb = [...prev]; const p = { ...nb[idx], hidden: false }; nb[idx] = p;
                    recordMove({ type:'REVEAL', idx, p:p.id });
                    if (!userColor) { setUserColor(p.color); setTurn(p.color === 'red' ? 'black' : 'red'); }
                    else setTurn(t => (t === 'red' ? 'black' : 'red'));
                    return nb;
                });
                setSelectedIdx(null); setNoProgressCount(0);
            };

            const startMove = (f, t) => {
                const atk = board[f], vic = board[t];
                setAnimatingPiece({ from: f, to: t, piece: atk }); setSelectedIdx(null);
                setTimeout(() => {
                    setBoard(prev => {
                        const nb = [...prev]; const a = nb[f], v = nb[t];
                        if (v) {
                            playSound('eat'); setGraveyard(g => ({ ...g, [v.color]: [...g[v.color], v] }));
                            setEatToast(`${a.color==='red'?'紅':'黑'}:${a.name} 吃 ${v.color==='red'?'紅':'黑'}:${v.name}`);
                            setTimeout(() => setEatToast(null), 400); setNoProgressCount(0);
                        } else { playSound('move'); setNoProgressCount(c => c + 1); }
                        nb[t] = a; nb[f] = null;
                        recordMove({ type:'MOVE', f, t, atk:a.id, vic:v?v.id:null });
                        return nb;
                    });
                    setAnimatingPiece(null);
                    setTurn(cur => (cur === 'red' ? 'black' : 'red'));
                }, 100);
            };

            useEffect(() => {
                if (gameState !== 'playing') return;
                const r = board.filter(x => x && x.color === 'red').length;
                const b = board.filter(x => x && x.color === 'black').length;
                if (r === 0 || b === 0) endGame((userColor === 'red' && b === 0) || (userColor === 'black' && r === 0), "戰至最後一兵一卒。");
                else if (noProgressCount >= 60 && board.filter(x => x && x.color !== userColor).length <= 2) endGame(false, "僵局達成。", true);
            }, [board, gameState, noProgressCount, userColor]);

            useEffect(() => {
                if (gameState === 'playing' && userColor && turn !== userColor && !isAiThinking) {
                    setIsAiThinking(true);
                    const intA = new Int8Array(32);
                    board.forEach((p, i) => {
                        if(!p) intA[i] = 0;
                        else { 
                            let v = PIECE_TYPES[p.type]; if (p.color === 'black') v = -v; 
                            if (p.hidden) v = (v > 0 ? v + 100 : v - 100); intA[i] = v; 
                        }
                    });
                    aiWorkerRef.current.onmessage = (e) => {
                        const { move } = e.data;
                        setTimeout(() => { if (!move) { setIsAiThinking(false); return; }
                        if (move.a === 'flip') revealPiece(move.idx); else startMove(move.from, move.to);
                        setIsAiThinking(false); }, 100);
                    };
                    aiWorkerRef.current.postMessage({ boardData: intA.buffer, aiColor: turn, timeLimit: 1800 });
                }
            }, [turn, userColor, gameState, board]);

            const getPosFE = (idx) => ({ top: `${Math.floor(idx / 4) * 12.5}%`, left: `${(idx % 4) * 25}%` });

            const handleCellClick = (idx) => {
                if (gameState !== 'playing' || isAiThinking || (userColor && turn !== userColor)) return;
                const p = board[idx];
                if (p && p.hidden) { revealPiece(idx); return; }
                if (p && !p.hidden && p.color === turn) { setSelectedIdx(idx); return; }
                if (selectedIdx !== null && selectedIdx !== idx) { if (isValidFE(selectedIdx, idx, board)) startMove(selectedIdx, idx); }
            };

            return (
                <div className="flex flex-col h-screen bg-stone-100 font-serif select-none overflow-hidden items-center justify-center w-full relative">
                    {eatToast && (
                        <div className="absolute top-[40%] left-1/2 -translate-x-1/2 -translate-y-1/2 z-[150] pointer-events-none animate-flash-toast">
                            <div className="bg-red-700 text-white px-8 py-3 rounded-full shadow-2xl text-2xl font-black tracking-widest border-4 border-red-900">{eatToast}</div>
                        </div>
                    )}

                    {gameState === 'lobby' && (
                        <div className="bg-white p-10 rounded shadow-lg border border-stone-200 w-[95vw] max-w-sm animate-fade-in text-stone-800 relative text-center">
                            <h1 className="text-3xl font-bold mb-6 text-stone-900 tracking-widest">賢哥的暗棋</h1>
                            <div className="mb-10 text-amber-700 font-bold flex items-center justify-center gap-2"><Trophy size={20} /><span>我的積分：{playerScore}</span></div>
                            <div className="space-y-8">
                                <div className="font-bold text-stone-800 text-lg">歡迎，林大爺</div>
                                <button onClick={initGame} className="w-full flex items-center gap-4 p-5 rounded border-2 border-red-600 bg-white hover:bg-red-50 transition-all shadow-md active:scale-95">
                                    <div className="text-4xl">👺</div>
                                    <div className="text-left flex-1 font-bold text-xl text-stone-900">東方不敗<div className="text-[10px] text-red-600 font-black">贏+500 / 輸-500</div></div>
                                </button>
                            </div>
                            <button onClick={downloadArchive} className="absolute bottom-2 right-2 opacity-5 hover:opacity-100 transition-opacity text-[8px] text-stone-400">ANALYZE DATA</button>
                        </div>
                    )}

                    {(gameState === 'playing' || gameState === 'ended') && (
                        <div className="w-[95vw] max-w-md flex flex-col h-[95vh] rounded bg-white relative shadow-2xl overflow-hidden">
                            {showWinScreen && (
                                <div className="fixed inset-0 z-[120] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                                    <div className="bg-white rounded-xl p-8 max-w-xs w-full text-center shadow-2xl border border-stone-200">
                                        <h2 className="text-3xl font-black text-stone-900 mb-6">{winMessage.title}</h2>
                                        {/* 結算字體巨大化 */}
                                        <div className="text-6xl font-black text-red-600 mb-8 border-4 border-red-500 p-4 rounded bg-red-50 leading-tight drop-shadow-lg">{winMessage.detail}</div>
                                        <div className="text-4xl font-black text-stone-900 mb-8">{winMessage.points} 積分</div>
                                        <button onClick={() => setShowWinScreen(false)} className="w-full py-4 bg-stone-900 text-white rounded-lg font-black text-xl active:scale-95">關閉並存檔</button>
                                    </div>
                                </div>
                            )}

                            {showTimeoutWarning && gameState === 'playing' && (
                                <div className="absolute top-24 z-50 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-2 rounded-full shadow-lg font-bold animate-pulse border-2 border-red-900 w-max text-xs">
                                    <Clock size={14} className="inline mr-1" />時間內未下棋，則敗局
                                </div>
                            )}

                            <div className="bg-white p-3 z-20 border-b border-stone-200 flex-shrink-0">
                                <div className="flex justify-between items-center mb-2">
                                    <div className="flex items-center gap-3 w-full">
                                        <div className={`w-12 h-12 rounded flex items-center justify-center text-4xl border-2 ${turn !== userColor ? 'border-black bg-stone-50' : 'border-transparent'}`}>👺</div>
                                        <div className="flex-1 font-bold text-lg text-stone-900 flex items-center gap-2">
                                            東方不敗
                                            {userColor && <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded border ${userColor === 'red' ? 'text-stone-800 border-stone-300 bg-stone-100' : 'text-red-700 border-red-300 bg-red-50'}`}>{userColor === 'red' ? '持黑' : '持紅'}</span>}
                                        </div>
                                        <button onClick={() => setSoundOn(!soundOn)} className="text-stone-400 p-2 ml-auto">{soundOn ? <Volume2 size={20} /> : <VolumeX size={20} />}</button>
                                    </div>
                                </div>
                                <div className={`w-full text-center py-1 rounded font-black text-sm ${turn === userColor ? 'text-green-700' : 'text-stone-600'}`}>{turn === userColor ? "請您落子" : "對方思考中..."}</div>
                                <div className="bg-stone-50 rounded px-2 py-1 text-[10px] leading-tight flex flex-wrap gap-x-1 items-start min-h-[1.2rem] mt-2 border border-stone-200">
                                    <span className="text-stone-500 font-bold whitespace-nowrap">對方吃子:</span>
                                    <span className="flex gap-x-1 font-bold flex-wrap">{userColor && graveyard[userColor]?.map((p, i) => <span key={i} className={p.color === 'red' ? 'text-red-700' : 'text-stone-900'}>{p.name}</span>)}</span>
                                </div>
                            </div>

                            <div className="flex-1 bg-stone-100 flex items-center justify-center p-3 relative min-h-0 overflow-hidden">
                                <div className="game-board relative bg-white shadow-md mx-auto" style={{ width: '100%', maxHeight: '100%', aspectRatio: '1/2' }}>
                                    <div className="absolute inset-0 grid grid-cols-4 grid-rows-8 pointer-events-none">{Array(32).fill(0).map((_, i) => <div key={i} className="game-cell" style={{ border: '2px solid black' }}></div>)}</div>
                                    {board.map((p, idx) => {
                                        const pos = getPosFE(idx);
                                        return (
                                            <div key={idx} onClick={() => handleCellClick(idx)} className={`absolute w-[25%] h-[12.5%] flex items-center justify-center transition-opacity ${animatingPiece?.from === idx ? 'opacity-0' : 'opacity-100'}`} style={{ top: pos.top, left: pos.left }}>
                                                <div className={`w-[45%] aspect-square rounded-full flex items-center justify-center shadow-sm cursor-pointer ${!p?'invisible':''} ${idx === selectedIdx ? 'ring-4 ring-yellow-400 z-10 scale-110' : ''} ${p?.hidden?'bg-green-200 border-2 border-green-400':'bg-stone-50 border-2 border-stone-300'}`}>
                                                    {p && !p.hidden && <span className={`font-serif text-2xl font-black ${p.color==='red'?'text-red-700':'text-stone-900'}`}>{p.name}</span>}
                                                </div>
                                            </div>
                                        );
                                    })}
                                    {animatingPiece && (
                                        <div className="absolute w-[25%] h-[12.5%] flex items-center justify-center z-50 transition-all duration-100 ease-in-out" style={{ top: getPosFE(animatingPiece.to).top, left: getPosFE(animatingPiece.to).left }}>
                                            <div className={`w-[45%] aspect-square rounded-full flex items-center justify-center shadow-xl bg-stone-50 border-2 border-stone-300 scale-110`}>
                                                <span className={`font-serif text-2xl font-black ${animatingPiece.piece.color === 'red' ? 'text-red-700' : 'text-stone-900'}`}>{animatingPiece.piece.name}</span>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="bg-white p-3 z-20 border-t border-stone-200 flex-shrink-0">
                                <div className="bg-stone-50 rounded px-2 py-1 text-[10px] leading-tight flex flex-wrap gap-x-1 items-start min-h-[1.2rem] mb-3 border border-stone-200">
                                    <span className="text-stone-500 font-bold whitespace-nowrap">我方吃子:</span>
                                    <span className="flex gap-x-1 font-bold flex-wrap">{userColor && graveyard[userColor==='red'?'black':'red']?.map((p, i) => <span key={i} className={p.color === 'red' ? 'text-red-700' : 'text-stone-900'}>{p.name}</span>)}</span>
                                </div>
                                {gameState === 'ended' ? (
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={initGame} className="py-3 bg-red-700 text-white rounded font-black active:scale-95 shadow-md flex items-center justify-center gap-2"><RefreshCw size={20}/> 再戰一局</button>
                                        <button onClick={() => setGameState('lobby')} className="py-3 bg-stone-800 text-white rounded font-black active:scale-95 shadow-md flex items-center justify-center gap-2">回到大廳</button>
                                    </div>
                                ) : (
                                    <div className="flex justify-between items-center">
                                        <div className="flex items-center gap-3">
                                            <div className={`w-12 h-12 rounded flex items-center justify-center text-3xl border-2 border-black bg-stone-50`}>👨</div>
                                            <div>
                                                <div className="flex items-baseline gap-2">
                                                    <div className="font-bold text-lg text-stone-900 leading-tight">林大爺</div>
                                                    {userColor && <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded border ${userColor === 'red' ? 'text-red-700 border-red-300 bg-red-50' : 'text-stone-800 border-stone-300 bg-stone-100'}`}>{userColor === 'red' ? '持紅' : '持黑'}</span>}
                                                </div>
                                                <div className={`flex items-center gap-2 text-xs font-black ${playerTimeLeft <= 20 ? 'text-red-600' : 'text-amber-700'}`}>
                                                    <Trophy size={12} />{playerScore} <span className={`font-mono ml-2 ${playerTimeLeft <= 20 ? 'text-red-600 animate-pulse' : 'text-stone-400'}`}>{playerTimeLeft}s</span>
                                                </div>
                                            </div>
                                        </div>
                                        <button onClick={handleSurrender} className="flex flex-col items-center justify-center w-14 h-12 bg-white rounded border border-stone-200 text-stone-400 hover:text-red-600 transition-all active:scale-95"><Flag size={18} /><span className="text-[10px] font-bold mt-0.5">認輸</span></button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HiddenChessApp />);
    </script>
</body>
</html>
